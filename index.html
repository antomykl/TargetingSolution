<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <style>
    :root {
      --bg: #f3f7f5;
      --panel: #ffffff;
      --text: #1b2a27;
      --muted: #5b6b67;
      --border: #cfd9d5;
      --accent: #0f8d67;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 90% 12%, rgba(15, 141, 103, 0.12), transparent 32%), var(--bg);
    }

    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(17, 36, 31, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 3vw, 1.9rem);
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Project Folders</h1>
    <p>This repository is organized by folders so new demos can be added without mixing files in the root.</p>
    <ul>
      <li><a href="CoordinateSystem/index.html">CoordinateSystem</a> - SVG and Canvas coordinate system demos</li>
    </ul>
  </main>
</body>
</html>
